    <script>
    // GANTI TEKS DI BAWAH INI DENGAN URL WEB APP YANG ANDA SALIN DARI APPS SCRIPT
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxmzugOw4_bVD4k-kx0uIMB1PyCjY9GDQTTn7GziRf8nvbQblB7PzMI5LAbvky2STZcRg/exec";

    // Mekanisme Polyfill menggunakan JavaScript Proxy
    window.google = {
        script: {
            run: (function() {
                function createRunner(successFn, failureFn) {
                    const obj = {
                        withSuccessHandler: function(callback) {
                            return createRunner(callback, failureFn);
                        },
                        withFailureHandler: function(callback) {
                            return createRunner(successFn, callback);
                        }
                    };
                    
                    return new Proxy(obj, {
                        get(target, prop) {
                            if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') {
                                return target[prop];
                            }
                            
                            // Menangkap setiap pemanggilan fungsi backend secara dinamis
                            return function(...args) {
                                fetch(GAS_API_URL, {
                                    method: "POST",
                                    headers: { 
                                        // Menggunakan text/plain untuk menghindari kendala pembatasan CORS Preflight di beberapa browser
                                        "Content-Type": "text/plain;charset=utf-8" 
                                    },
                                    body: JSON.stringify({ action: prop, payload: args })
                                })
                                .then(response => {
                                    if (!response.ok) {
                                        throw new Error("Koneksi ke Apps Script gagal (Status: " + response.status + ")");
                                    }
                                    return response.json();
                                })
                                .then(data => {
                                    if (data && data.error) {
                                        if (failureFn) failureFn(data.error);
                                        else console.error("GAS Backend Error:", data.error);
                                    } else {
                                        if (successFn) successFn(data);
                                    }
                                })
                                .catch(error => {
                                    if (failureFn) failureFn(error.message || error);
                                    else console.error("Network Fetch Error:", error);
                                });
                            };
                        }
                    });
                }
                return createRunner(null, null);
            })()
        }
    };
</script>

    <script>
        let users = [];
        let customers = [];
        let products = []; 
        let migrasiData = [];
        let appSettings = {}; 
        let currentUser = null;
        let currentView = 'dashboard';
        let currentInputTab = 'baru'; 
        let currentUploadTab = 'baru';
        
        const getLocalYM = () => {
            const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().substring(0, 7); 
        };
        const getLocalYMD = () => {
            const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };
        
        let currentInputFilterDate = getLocalYMD(); 
        let currentInputSearchTerm = '';
        let currentReportTab = 'baru'; 
        let isSidebarOpen = false;

        const formatDate = (dateString) => {
            if(!dateString) return '-';
            return new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' });
        };

        const getProductName = (kode) => {
            if (!kode) return '-';
            const cleanKode = (kode.toString() || '').replace(/^'/, '').trim().toUpperCase();
            const prod = products.find(p => (p.kode.toString() || '').replace(/^'/, '').trim().toUpperCase() === cleanKode);
            return prod ? `${cleanKode} - ${prod.nama}` : cleanKode;
        };

        const cleanStr = (s) => (s || '').toString().replace(/^'/, '').trim().toUpperCase();
        const checkStatus = (statusStr, targetStatus) => (statusStr || '').toString().trim().toLowerCase() === targetStatus.toLowerCase();

        const displayStatusText = (statusStr) => {
            if(checkStatus(statusStr, 'Sudah')) return 'Sudah aktivasi';
            if(checkStatus(statusStr, 'Belum')) return 'Belum aktivasi';
            if(checkStatus(statusStr, 'Tidak')) return 'Tidak dapat diaktivasi';
            return statusStr || '-';
        };

        const isDataOwnedByUser = (itemData, userObj) => {
            const estimArray = (userObj.userEstim || '').split(',').map(s => cleanStr(s)).filter(s => s !== '');
            if (estimArray.length > 0) return estimArray.includes(cleanStr(itemData.userEstim));
            return cleanStr(itemData.kodeCabang) === cleanStr(userObj.id);
        };

        const canViewData = (itemData, currentUser) => {
            if (currentUser.role === 'admin' || currentUser.role === 'supervisor' || currentUser.role === 'fasilitator') return true;
            return isDataOwnedByUser(itemData, currentUser);
        };

        function showLoader(text = 'Memproses...') { document.getElementById('loadingText').innerText = text; document.getElementById('loadingOverlay').classList.remove('hide'); }
        function hideLoader() { document.getElementById('loadingOverlay').classList.add('hide'); }

        function showToast(msg, isWarning = false) {
            const toast = document.getElementById('toast');
            const icon = isWarning ? '<i class="fas fa-exclamation-triangle text-yellow-400 mr-2"></i>' : '<i class="fas fa-check-circle text-green-400 mr-2"></i>';
            toast.innerHTML = icon + msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar'); const overlay = document.getElementById('sidebarOverlay');
            isSidebarOpen = !isSidebarOpen;
            if (isSidebarOpen) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hide'); } 
            else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hide'); }
        }

        function takeScreenshot(elementId, fileName) {
            const el = document.getElementById(elementId);
            if(!el) return;
            showLoader('Membuat gambar...');
            html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#f3f4f6" }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName + '_' + getLocalYMD() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                hideLoader();
            }).catch(err => {
                alert("Gagal membuat screenshot."); hideLoader();
            });
        }

        window.onload = function() {
            if(typeof google === 'undefined') { alert("Jalankan aplikasi ini di dalam Web App agar terhubung dengan database."); return; }
            showLoader('Menghubungkan ke Database...');
            google.script.run.withSuccessHandler(function(response) {
                users = response.users;
                customers = (response.customers || []).filter(c => c.id && c.id.toString().trim() !== '');
                products = response.products || [];
                migrasiData = (response.migrasiData || []).filter(m => m.id && m.id.toString().trim() !== '');
                appSettings = response.settings || {};
                hideLoader();
                if(currentUser) navigate(currentView, document.getElementById('pageTitle').innerText);
            }).withFailureHandler(function(err) {
                alert("Gagal memuat data: " + err); hideLoader();
            }).getInitialData();
        };
    </script>

    <script>
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('loginId').value.trim(); const pwd = document.getElementById('loginPwd').value;
            const user = users.find(u => u.id === id && u.password === pwd);
            if (user) {
                currentUser = user; document.getElementById('loginError').classList.add('hide'); document.getElementById('loginScreen').classList.add('hide'); document.getElementById('appScreen').classList.remove('hide');
                document.getElementById('userNameDisplay').innerText = user.id + ' - ' + (user.namaUser || 'Pengguna'); 
                
                let roleText = 'Unit: ' + (user.namaUnit || '-');
                if(user.role === 'admin') roleText = 'Administrator';
                if(user.role === 'supervisor') roleText = 'Supervisor - ' + (user.namaUnit || '');
                if(user.role === 'fasilitator') roleText = 'Fasilitator - ' + (user.namaUnit || '');
                document.getElementById('userRoleDisplay').innerText = roleText; 
                document.getElementById('userInitial').innerText = (user.namaUser || user.id).charAt(0).toUpperCase();
                
                buildMenu(); navigate('dashboard');
            } else { document.getElementById('loginError').classList.remove('hide'); }
        }

        function logout() { currentUser = null; document.getElementById('loginId').value = ''; document.getElementById('loginPwd').value = ''; document.getElementById('appScreen').classList.add('hide'); document.getElementById('loginScreen').classList.remove('hide'); if(isSidebarOpen) toggleSidebar(); }

        function refreshData() {
            showLoader('Menyinkronkan data terbaru...');
            google.script.run.withSuccessHandler(function(response) {
                users = response.users;
                customers = (response.customers || []).filter(c => c.id && c.id.toString().trim() !== '');

                migrasiData = (response.migrasiData || []).filter(m => m.id && m.id.toString().trim() !== '');
                appSettings = response.settings || {};
                hideLoader();
                showToast('Data berhasil disinkronkan!');
                navigate(currentView, document.getElementById('pageTitle').innerText); 
            }).withFailureHandler(function(err) {
                alert("Gagal memuat data: " + err); hideLoader();
            }).getInitialData();
        }

                { id: 'upload_data', icon: 'fa-upload', label: 'Upload Data Nasabah' },

                { id: 'manage_products', icon: 'fa-box', label: 'Kelola Produk' },
                { id: 'laporan_admin', icon: 'fa-file-alt', label: 'Laporan Aktivasi' },
                { id: 'pengaturan_wa', icon: 'fa-cogs', label: 'Pengaturan WA' }

        // PERBAIKAN TEMPLATE: Memeriksa flag isMigrasi agar tidak terkecoh letak menu
        function downloadTemplateExcel(isMigrasi = false) {
            let templateData;
            if (isMigrasi) {
                templateData = [{ "kode_cabang": "009", "cif": "12345678", "no_rekening": "009123456789", "nama_rekening": "Budi Santoso", "tipe_produk": "T01", "no_hp": "081234567890", "user_estim": "JTM009SP01", "nama_fasilitator": "Andi JConnect" }];
            } else {
                templateData = [{ "kode_cabang": "009", "cif": "12345678", "no_rekening": "009123456789", "nama_rekening": "Budi Santoso", "tipe_produk": "T01", "no_hp": "081234567890", "user_estim": "JTM009SP01" }];
            }
            const label = isMigrasi ? 'Migrasi' : 'Aktivasi_Baru';
            const ws = XLSX.utils.json_to_sheet(templateData); 
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, ws, "Template"); 
            XLSX.writeFile(wb, `Template_${label}_JConnect.xlsx`);
        }

        function handleFileUpload(e, isMigrasi) {
            e.preventDefault(); 
            const form = e.target;
            const fileInput = form.querySelector('input[type="file"]'); 
            const dateInput = form.querySelector('input[type="date"]').value;
            
            if (fileInput.files.length === 0) return; showLoader('Membaca Excel...');
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
                let mappedData = [];
                for(let row of jsonData) {
                    let getVal = (possibleKeys) => { let key = Object.keys(row).find(k => possibleKeys.includes(k.toLowerCase().trim())); return key ? row[key].toString() : ""; };
                    
                    let cab = getVal(['kode cabang', 'kode_cabang']); 
                    if(currentUser.role === 'user') { cab = currentUser.id; }
                    
                    let rek = getVal(['no_rekening', 'no rekening']);
                    let cleanRek = rek ? rek.toString().trim() : "";
                    
                    // VALIDASI KETAT: Hanya proses baris yang memiliki No Rekening yang tidak kosong
                    if(cleanRek !== "") {
                        let obj = { 
                            date: dateInput, 
                            kodeCabang: cab, 
                            cif: getVal(['cif']), 
                            noRek: cleanRek, 
                            tipeProduk: getVal(['tipe_produk', 'tipe produk']), 
                            nama: getVal(['nama_rekening', 'nama rekening']), 
                            noHp: getVal(['no hp', 'no_hp']), 
                            userEstim: getVal(['user_estim', 'user estim']) 
                        };
                        
                        if (isMigrasi) {
                            obj.namaFasilitator = getVal(['nama_fasilitator', 'nama fasilitator', 'namafasilitator', 'fasilitator']);
                        }
                        mappedData.push(obj);
                    }
                }
                
                if(mappedData.length === 0) { hideLoader(); alert("Gagal. File Excel kosong atau format header tidak sesuai."); return; }
                
                showLoader(`Menyimpan ${mappedData.length} baris data ke Database...`);
                google.script.run.withSuccessHandler(function(newData) {
                    if(isMigrasi) migrasiData = migrasiData.concat(newData).filter(c=>c.id); else customers = customers.concat(newData).filter(c=>c.id);
                    hideLoader(); 
                    alert(`Upload Berhasil! ${mappedData.length} data valid berhasil ditambahkan.`); 
                    fileInput.value = "";
                    if(currentView === 'input_aktivasi') renderInputAktivasi(document.getElementById('mainContent'), currentInputTab);
                }).saveUploadedData(mappedData, isMigrasi);
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        function toggleSelectAll(source) {
            const checkboxes = document.querySelectorAll('.row-checkbox');

        function toggleBulkDeleteBtn() {
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            const totalBoxes = document.querySelectorAll('.row-checkbox').length;
            const btnDelete = document.getElementById('btnBulkDelete');
            const checkAll = document.getElementById('checkAll');
            
            if(checkedBoxes.length > 0) btnDelete.classList.remove('hide'); 
            else btnDelete.classList.add('hide');
            
            if(checkedBoxes.length === totalBoxes && totalBoxes > 0) checkAll.checked = true;
            else checkAll.checked = false;
        }

        function deleteSelected(tab) {
            const isMigrasi = tab === 'migrasi';

            if(checkedBoxes.length === 0) return;
            
            if(!confirm(`Apakah Anda yakin ingin menghapus permanen ${checkedBoxes.length} data terpilih?`)) return;
            
            const ids = Array.from(checkedBoxes).map(cb => cb.value);
            showLoader(`Menghapus ${ids.length} data...`);
            
            google.script.run.withSuccessHandler(function() {
                if(isMigrasi) {
                    migrasiData = migrasiData.filter(c => !ids.includes(c.id.toString()));
                } else {
                    customers = customers.filter(c => !ids.includes(c.id.toString()));
                }
                hideLoader();
                const checkAll = document.getElementById('checkAll');
                if (checkAll) checkAll.checked = false;
                
                toggleBulkDeleteBtn(); 
                applyFilterAdmin(tab); 
                showToast(`${ids.length} data berhasil dihapus`);
            }).deleteMultipleCustomers(ids, isMigrasi);
        }

                        <div class="flex items-center"><label class="text-sm font-medium mr-2 text-gray-600"><i class="fas fa-search"></i></label><input type="text" value="${currentInputSearchTerm}" onkeyup="changeInputSearch(this.value)" placeholder="Cari Nama/No Rek..." class="border rounded px-3 py-1.5 text-sm w-48 sm:w-64 outline-none focus:border-bjGreen focus:ring-1 focus:ring-bjGreen"></div>
                        <div class="flex items-center border-l pl-3"><label class="text-sm font-medium mr-2 text-gray-600"><i class="fas fa-calendar-alt"></i></label><input type="date" value="${currentInputFilterDate}" class="border rounded px-3 py-1.5 text-sm outline-none focus:border-bjGreen" onchange="changeInputFilterDate(this.value)"><button onclick="changeInputFilterDate('')" class="text-xs bg-gray-200 px-3 py-2 rounded ml-2 hover:bg-gray-300 font-medium">Reset Tgl</button></div>
                    </div>
                </div>
            `;

            let tableRows = displayData.map(c => {
                const isSudah = checkStatus(c.status,'Sudah');
                const isTidak = checkStatus(c.status,'Tidak');
                const selectStyle = isSudah ? 'bg-green-50 text-green-700 font-semibold' : isTidak ? 'bg-orange-50 text-orange-700 font-semibold' : 'bg-red-50 text-red-700 font-semibold';
                const inputStyle = isSudah ? 'disabled bg-gray-100 border-transparent text-gray-400' : 'bg-white border-gray-300 focus:border-bjGreen';
                
                return `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="px-4 py-3 text-xs text-gray-500">${formatDate(c.date)}</td>
                    <td class="px-4 py-3 font-mono">
                        ${tab === 'migrasi' 
                            ? `<input type="text" value="${c.noRek}" onblur="autoSaveField('${c.id}', 'noRek', this.value, true)" onkeyup="if(event.key === 'Enter') this.blur();" class="w-full bg-transparent border-transparent hover:bg-white focus:bg-white focus:border-bjGreen focus:ring-1 rounded outline-none px-1 py-1 transition-all" title="Klik untuk edit No Rekening">` 
                            : c.noRek}
                    </td>
                    <td class="px-4 py-3">
                        ${tab === 'migrasi' 
                            ? `<div class="flex flex-col min-w-[150px]">
                                   <input type="text" value="${c.nama}" onblur="autoSaveField('${c.id}', 'nama', this.value, true)" onkeyup="if(event.key === 'Enter') this.blur();" class="w-full font-semibold text-gray-800 bg-transparent border-transparent hover:bg-white focus:bg-white focus:border-bjGreen focus:ring-1 rounded outline-none px-1 py-0.5 transition-all" title="Klik untuk edit Nama">
                                   <input type="text" value="${c.noHp || ''}" onblur="autoSaveField('${c.id}', 'noHp', this.value, true)" onkeyup="if(event.key === 'Enter') this.blur();" placeholder="No HP" class="w-full text-xs text-gray-500 bg-transparent border-transparent hover:bg-white focus:bg-white focus:border-bjGreen focus:ring-1 rounded outline-none px-1 py-0.5 transition-all" title="Klik untuk edit No HP">
                               </div>` 
                            : `<div class="flex flex-col"><div class="font-semibold text-gray-800 block">${c.nama}</div><div class="text-xs text-gray-500 block">${c.noHp || '-'}</div></div>`}
                    </td>
                    ${tab==='migrasi' ? `<td class="px-4 py-3"><input type="text" value="${c.namaFasilitator || ''}" onblur="autoSaveField('${c.id}', 'namaFasilitator', this.value, true)" onkeyup="if(event.key === 'Enter') this.blur();" class="w-full text-xs text-blue-600 font-semibold bg-transparent border-transparent hover:bg-white focus:bg-white focus:border-bjGreen focus:ring-1 rounded outline-none px-1 py-1 transition-all" title="Klik untuk edit Fasilitator"></td>` : ''}
                    <td class="px-4 py-3">
                        <select id="status_${c.id}" onchange="handleStatusChange('${c.id}', this.value, ${tab==='migrasi'})" class="w-full border rounded px-2 py-1.5 text-sm transition ${selectStyle}">
                            <option value="Belum" ${checkStatus(c.status,'Belum')?'selected':''}>Belum aktivasi</option>
                            <option value="Sudah" ${checkStatus(c.status,'Sudah')?'selected':''}>Sudah aktivasi</option>
                            <option value="Tidak" ${checkStatus(c.status,'Tidak')?'selected':''}>Tidak dapat diaktivasi</option>
                        </select>
                    </td>
                    <td class="px-4 py-3">
                        <input type="text" id="kendala_${c.id}" value="${c.kendala || ''}" onblur="autoSave('${c.id}', ${tab==='migrasi'})" onkeyup="if(event.key === 'Enter') this.blur();" class="w-full border rounded px-2 py-1 text-sm outline-none transition ${inputStyle}" placeholder="Isi alasan jika pending..." ${isSudah?'disabled':''}>
                    </td>
                    ${tab==='migrasi' ? `<td class="px-4 py-3 text-center"><button onclick="deleteInputData('${c.id}', true)" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-1.5 rounded transition" title="Hapus Data"><i class="fas fa-trash"></i></button></td>` : ''}
                </tr>
            `}).join('') || `<tr><td colspan="${tab==='migrasi'?7:5}" class="text-center py-8 text-gray-500"><i class="fas fa-folder-open text-3xl mb-3 text-gray-300 block"></i>Tidak ada data yang sesuai pencarian.</td></tr>`;

            let formTambahLama = '';
            if (tab === 'migrasi') {
                const estimArray = (currentUser.userEstim || '').split(',').map(s => cleanStr(s)).filter(s => s !== '');
                const estimInputHTML = estimArray.length > 0 ? `<select id="migrasi_estim" class="w-full border rounded px-3 py-2 text-sm focus:border-bjGreen outline-none" required>${estimArray.map(e => `<option value="${e}">${e}</option>`).join('')}</select>` : `<input type="text" id="migrasi_estim" class="w-full border rounded px-3 py-2 text-sm focus:border-bjGreen outline-none" placeholder="Kosongkan jika tdk ada">`;
                
                formTambahLama = `
                    <div class="p-4 bg-gray-50 border-b flex flex-col xl:flex-row gap-4">
                        <div class="flex-1 bg-white border border-gray-200 rounded p-4 shadow-sm">
                            <h4 class="text-sm font-bold text-gray-700 mb-3"><i class="fas fa-keyboard text-blue-500 mr-2"></i>Input Manual Rekening Lama</h4>
                            <form onsubmit="saveMigrasiCepat(event)" class="flex flex-col sm:flex-row flex-wrap gap-3 items-start sm:items-end">
                                <div class="w-full sm:flex-1"><label class="block text-xs mb-1">No Rekening</label><input type="text" id="migrasi_rek" class="w-full border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen" required></div>
                                <div class="w-full sm:flex-1"><label class="block text-xs mb-1">Nama</label><input type="text" id="migrasi_nama" class="w-full border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen" required></div>
                                <div class="w-full sm:w-28"><label class="block text-xs mb-1">No HP</label><input type="text" id="migrasi_hp" class="w-full border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"></div>
                                <div class="w-full sm:w-32"><label class="block text-xs mb-1 font-bold text-blue-600">Nama Fasilitator</label><input type="text" id="migrasi_fasil" class="w-full border rounded px-3 py-2 text-sm outline-none focus:border-blue-500 bg-blue-50"></div>
                                <div class="w-full sm:w-32"><label class="block text-xs mb-1">User Estim</label>${estimInputHTML}</div>
                                <button type="submit" class="w-full sm:w-auto bg-blue-600 text-white px-5 py-2 rounded text-sm hover:bg-blue-700 shadow"><i class="fas fa-plus mr-1"></i>Tambah</button>
                            </form>
                        </div>
                        <div class="xl:w-1/3 bg-white border border-gray-200 rounded p-4 shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <h4 class="text-sm font-bold text-gray-700"><i class="fas fa-file-excel text-green-600 mr-2"></i>Upload Excel</h4>
                                <!-- PERUBAHAN: Mempassing true agar mendownload format migrasi -->
                                <button type="button" onclick="downloadTemplateExcel(true)" class="text-xs text-blue-600 hover:underline"><i class="fas fa-download mr-1"></i>Template</button>
                            </div>
                            <form onsubmit="handleFileUpload(event, true)" class="flex flex-col gap-2">
                                <div class="flex gap-2">
                                    <div class="flex-1"><label class="block text-xs mb-1">Tgl Data</label><input type="date" value="${getLocalYMD()}" class="w-full border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen" required></div>
                                    <div class="flex-1"><label class="block text-xs mb-1">Pilih File</label><input type="file" accept=".xlsx, .xls" class="w-full border rounded px-2 py-1.5 text-sm outline-none" required></div>
                                </div>
                                <button type="submit" class="w-full bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 shadow"><i class="fas fa-upload mr-2"></i>Mulai Upload</button>
                            </form>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm flex flex-col h-full overflow-hidden">
                    <div class="flex border-b">
                        <button onclick="renderInputAktivasi(document.getElementById('mainContent'), 'baru')" class="w-full py-3 px-2 text-sm font-semibold transition ${tab === 'baru' ? 'text-bjGreen border-b-2 border-bjGreen bg-bjLight' : 'text-gray-500 hover:bg-gray-50'}">Rekening Baru</button>
                        <button onclick="renderInputAktivasi(document.getElementById('mainContent'), 'migrasi')" class="w-full py-3 px-2 text-sm font-semibold transition ${tab === 'migrasi' ? 'text-bjGreen border-b-2 border-bjGreen bg-bjLight' : 'text-gray-500 hover:bg-gray-50'}">Rekening Lama</button>
                    </div>
                    ${formTambahLama}
                    ${filterUI}
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-sm text-left whitespace-nowrap"><thead class="bg-gray-100 text-gray-600 uppercase text-xs sticky top-0"><tr><th class="px-4 py-3">Tgl</th><th class="px-4 py-3">No Rek</th><th class="px-4 py-3">Nama & HP</th>${tab==='migrasi' ? '<th class="px-4 py-3">Fasilitator</th>' : ''}<th class="px-4 py-3 min-w-[140px]">Status</th><th class="px-4 py-3 min-w-[200px]">Kendala</th>${tab==='migrasi' ? '<th class="px-4 py-3 text-center">Aksi</th>' : ''}</tr></thead>
                        <tbody>${tableRows}</tbody></table>
                    </div>
                </div>
            `;
        }

        function autoSaveField(id, field, value, isMigrasi) {
            let arr = isMigrasi ? migrasiData : customers;
            let cust = arr.find(c => c.id == id);
            
            if (cust) {
                if (cust[field] === value) return;
                cust[field] = value;
            }

            google.script.run.withSuccessHandler(function() {
                showToast('Perubahan data tersimpan otomatis!');
            }).updateSingleField(id, field, value, isMigrasi);
        }

        function deleteInputData(id, isMigrasi) {
            if(!confirm('Apakah Anda yakin ingin menghapus baris data ini?')) return;
            showLoader('Menghapus Data...');
            google.script.run.withSuccessHandler(function() {
                if(isMigrasi) migrasiData = migrasiData.filter(c => c.id != id); else customers = customers.filter(c => c.id != id);
                hideLoader(); renderInputAktivasi(document.getElementById('mainContent'), currentInputTab); showToast('Data berhasil dihapus');
            }).deleteCustomer(id, isMigrasi);
        }

        function toggleKendala(id, val) { 
            const el = document.getElementById(`kendala_${id}`); 
            if(val === 'Belum' || val === 'Tidak') { 
                el.disabled = false; el.classList.remove('bg-gray-100', 'border-transparent', 'text-gray-400'); el.classList.add('bg-white', 'border-gray-300'); 
            } else { 
                el.disabled = true; el.classList.add('bg-gray-100', 'border-transparent', 'text-gray-400'); el.classList.remove('bg-white', 'border-gray-300', 'border-red-400', 'bg-red-50'); el.value = ''; 
            } 
        }

        function handleStatusChange(id, val, isMigrasi) {
            toggleKendala(id, val); autoSave(id, isMigrasi);
            if (val === 'Tidak' || val === 'Belum') document.getElementById(`kendala_${id}`).focus();
        }

        function autoSave(id, isMigrasi) {
            const status = document.getElementById(`status_${id}`).value;
            const kendalaInput = document.getElementById(`kendala_${id}`);
            let kendala = kendalaInput.value;

            if (status === 'Sudah') { kendala = ''; kendalaInput.value = ''; }

            const selectEl = document.getElementById(`status_${id}`);
            selectEl.classList.add('opacity-50');

            google.script.run.withSuccessHandler(function() {
                let arr = isMigrasi ? migrasiData : customers; let cust = arr.find(c => c.id == id); 
                if(cust) { cust.status = status; cust.kendala = kendala; }
                selectEl.classList.remove('opacity-50');
                selectEl.className = `w-full border rounded px-2 py-1.5 text-sm transition ${status==='Sudah'?'bg-green-50 text-green-700 font-semibold border-green-200':status==='Tidak'?'bg-orange-50 text-orange-700 font-semibold border-orange-200':'bg-red-50 text-red-700 font-semibold border-red-200'}`;
                
                if ((status === 'Belum' || status === 'Tidak') && !kendala.trim()) {
                    showToast('Status tersimpan. Mohon isi kolom kendala!', true); kendalaInput.classList.add('border-red-400', 'bg-red-50');
                } else { showToast('Tersimpan otomatis!'); kendalaInput.classList.remove('border-red-400', 'bg-red-50'); }
            }).updateAktivasi(id, status, kendala, isMigrasi);
        }

        function saveMigrasiCepat(e) {
            e.preventDefault();
            const data = { id: "", date: getLocalYMD(), kodeCabang: currentUser.id, cif: "", noRek: document.getElementById('migrasi_rek').value, nama: document.getElementById('migrasi_nama').value, tipeProduk: "", noHp: document.getElementById('migrasi_hp').value, userEstim: document.getElementById('migrasi_estim').value, namaFasilitator: document.getElementById('migrasi_fasil').value, mode: "add" };
            showLoader('Menyimpan Data...');
            google.script.run.withSuccessHandler(function(newId) {
                data.id = newId; data.status = 'Sudah'; data.kendala = ''; migrasiData.push(data); hideLoader(); 
                alert("Berhasil Ditambahkan!"); renderInputAktivasi(document.getElementById('mainContent'), 'migrasi');
            }).saveSingleCustomer(data, true);
        }

        // --- SUMMARY LAPORAN ---
        function renderLaporanAdmin(container, roleContext = 'admin') { renderLaporanBase(container, roleContext, 'baru'); }
        function renderLaporanUser(container) { renderLaporanBase(container, 'user', 'baru'); }

        function renderLaporanBase(container, roleContext, tab = 'baru') {
            currentReportTab = tab; 
            
            const uniqueUnits = [...new Set(users.filter(u => u.role === 'user').map(u => u.namaUnit).filter(Boolean))];
            let unitOptions = uniqueUnits.map(unit => `<option value="${unit}">${unit}</option>`).join('');
            
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm flex flex-col mb-6">
                    <div class="flex border-b">
                        <button onclick="renderLaporanBase(document.getElementById('mainContent'), '${roleContext}', 'baru')" class="w-full py-3 px-2 text-sm font-semibold transition ${tab === 'baru' ? 'text-bjGreen border-b-2 border-bjGreen bg-bjLight' : 'text-gray-500'}">Aktivasi Rekening Baru</button>
                        <button onclick="renderLaporanBase(document.getElementById('mainContent'), '${roleContext}', 'migrasi')" class="w-full py-3 px-2 text-sm font-semibold transition ${tab === 'migrasi' ? 'text-bjGreen border-b-2 border-bjGreen bg-bjLight' : 'text-gray-500'}">Aktivasi Rekening Existing (Migrasi V.3.0)</button>
                    </div>
                    <div class="p-4 sm:p-6 flex flex-wrap gap-4 items-end justify-between">
                        <div class="flex flex-wrap gap-4 items-end">
                            <div><label class="block text-xs mb-1 font-medium text-gray-600">Dari Tgl</label><input type="date" id="lap_start" value="${getLocalYMD()}" onchange="generateLaporan('${roleContext}')" class="border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"></div>
                            <div><label class="block text-xs mb-1 font-medium text-gray-600">Sampai Tgl</label><input type="date" id="lap_end" value="${getLocalYMD()}" onchange="generateLaporan('${roleContext}')" class="border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"></div>
                            ${(roleContext !== 'user') ? `<div><label class="block text-xs mb-1 font-medium text-gray-600">Pilih Nama Unit</label><select id="lap_cabang" onchange="generateLaporan('${roleContext}')" class="border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"><option value="ALL">Semua Unit Kerja (Summary)</option>${unitOptions}</select></div>` : ''}
                            <button onclick="document.getElementById('lap_start').value=''; document.getElementById('lap_end').value=''; generateLaporan('${roleContext}')" class="bg-gray-200 text-gray-700 px-5 py-2 rounded text-sm hover:bg-gray-300 transition font-medium" title="Tampilkan Semua Waktu">Semua Waktu</button>
                        </div>
                        <button onclick="takeScreenshot('laporanResult', 'Laporan_Aktivasi')" class="bg-indigo-600 text-white px-5 py-2 rounded text-sm shadow hover:bg-indigo-700 transition"><i class="fas fa-camera mr-2"></i>Screenshot</button>
                    </div>
                </div>
                <div id="laporanResult" class="hide flex flex-col gap-6 p-1 -m-1"></div>
            `;
            generateLaporan(roleContext);
        }

        function generateLaporan(roleContext) {
            const start = document.getElementById('lap_start').value; const end = document.getElementById('lap_end').value; const branch = document.getElementById('lap_cabang') ? document.getElementById('lap_cabang').value : 'ALL';
            let rawData = currentReportTab === 'baru' ? customers : migrasiData;
            let data = rawData;

            if(start) data = data.filter(c => c.date >= start); if(end) data = data.filter(c => c.date <= end);

            if (roleContext === 'user') { data = data.filter(c => canViewData(c, currentUser)); } 
            else if (branch !== 'ALL') { 
                const usersInUnit = users.filter(u => u.namaUnit === branch && u.role === 'user');
                data = data.filter(c => { return usersInUnit.some(u => isDataOwnedByUser(c, u)); });
            }

            let resHTML = '';
            const total = data.length; const sudah = data.filter(c => checkStatus(c.status, 'Sudah')).length;
            const persentase = total === 0 ? 0 : Math.round((sudah/total)*100);

            if (roleContext === 'user' || (roleContext !== 'user' && branch !== 'ALL')) {
                resHTML += `
                    <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 border-b border-t-4 border-t-bjGreen bg-bjLight flex justify-between items-center">
                        <div><h3 class="font-bold text-bjGreenDark text-lg">Laporan Aktivasi JConnect</h3><p class="text-sm text-gray-600 mt-1">Total Nasabah: <span class="font-bold text-gray-800">${total}</span> | Berhasil: <span class="font-bold text-green-700">${sudah}</span></p></div>
                        <div class="text-right"><div class="text-4xl font-bold text-bjGreen">${persentase}%</div><div class="text-xs font-semibold text-gray-500 tracking-wide uppercase mt-1">Success Rate</div></div>
                    </div>
                `;
            }

            if (roleContext !== 'user' && branch === 'ALL') {
                const sum = {};
                const activeUnits = [...new Set(users.filter(u => u.role === 'user').map(u => u.namaUnit).filter(Boolean))];
                activeUnits.forEach(unit => { sum[unit] = { name: unit, total: 0, sdh: 0, blm: 0, tdk: 0 }; });
                let unknown = { name: 'Data Tidak Dikenal', total: 0, sdh: 0, blm: 0, tdk: 0 };

                data.forEach(c => {
                    let ownerUser = users.find(u => u.role === 'user' && isDataOwnedByUser(c, u));
                    let targetSum = (ownerUser && ownerUser.namaUnit) ? sum[ownerUser.namaUnit] : unknown;
                    if(!targetSum) targetSum = unknown;
                    targetSum.total++;
                    if(checkStatus(c.status, 'Sudah')) targetSum.sdh++; else if(checkStatus(c.status, 'Tidak')) targetSum.tdk++; else targetSum.blm++;
                });

                let summaryRows = Object.values(sum).filter(s => s.total > 0);
                if (unknown.total > 0) summaryRows.push(unknown);

                let grandTotal = 0, grandSdh = 0, grandBlm = 0, grandTdk = 0;
                let summaryRowsHTML = summaryRows.map(s => { 
                    grandTotal += s.total; grandSdh += s.sdh; grandBlm += s.blm; grandTdk += s.tdk;
                    let prc = s.total === 0 ? 0 : Math.round((s.sdh/s.total)*100); 
                    return `<tr class="border-b"><td class="px-4 py-3 font-bold text-gray-800">${s.name}</td><td class="px-4 py-3 text-center font-medium">${s.total}</td><td class="px-4 py-3 text-center font-semibold text-green-600 bg-green-50">${s.sdh}</td><td class="px-4 py-3 text-center text-red-500">${s.blm}</td><td class="px-4 py-3 text-center text-orange-500">${s.tdk}</td><td class="px-4 py-3 text-center font-bold text-indigo-600 bg-indigo-50">${prc}%</td></tr>`; 
                }).join('') || '<tr><td colspan="6" class="text-center py-4">Tidak ada data</td></tr>';

                let grandPrc = grandTotal === 0 ? 0 : Math.round((grandSdh/grandTotal)*100);
                let totalRowHTML = '';
                if (grandTotal > 0) {
                    totalRowHTML = `<tr class="border-t-2 border-gray-300 bg-gray-200 font-bold text-gray-800"><td class="px-4 py-3 text-right uppercase text-xs">Total Keseluruhan</td><td class="px-4 py-3 text-center">${grandTotal}</td><td class="px-4 py-3 text-center text-green-700">${grandSdh}</td><td class="px-4 py-3 text-center text-red-700">${grandBlm}</td><td class="px-4 py-3 text-center text-orange-700">${grandTdk}</td><td class="px-4 py-3 text-center text-indigo-700">${grandPrc}%</td></tr>`;
                }

                resHTML += `
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
                        <div class="p-4 border-b bg-bjLight"><h3 class="font-bold text-bjGreenDark"><i class="fas fa-chart-bar mr-2"></i>Tabel Summary Aktivasi Per Unit Kerja</h3></div>
                        <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">Nama Unit Kerja</th><th class="px-4 py-3 text-center">Total Data</th><th class="px-4 py-3 text-center text-green-600">Sudah Aktivasi</th><th class="px-4 py-3 text-center text-red-600">Belum Aktivasi</th><th class="px-4 py-3 text-center text-orange-600">Tidak Bisa</th><th class="px-4 py-3 text-center">% Berhasil</th></tr></thead>
                        <tbody>${summaryRowsHTML}${totalRowHTML}</tbody></table></div>
                    </div>
                `;
            }

            let rincianDropdown = '';
            if (roleContext !== 'user') {
                const uniqueUnitsForDetail = [...new Set(users.filter(u => u.role === 'user').map(u => u.namaUnit).filter(Boolean))];
                let unitDetailOptions = uniqueUnitsForDetail.map(unit => `<option value="${unit}">${unit}</option>`).join('');
                rincianDropdown = `
                    <div class="flex items-center space-x-2 w-full sm:w-auto mt-2 sm:mt-0">
                        <label class="text-xs font-semibold text-gray-500 whitespace-nowrap"><i class="fas fa-filter mr-1"></i>Filter Unit:</label>
                        <select id="filterRincian" onchange="filterRincianData(this.value)" class="w-full sm:w-auto border border-gray-300 rounded px-2 py-1.5 text-xs outline-none focus:border-bjGreen">
                            <option value="ALL">Semua Unit Kerja</option>
                            ${unitDetailOptions}
                            <option value="Tidak Dikenal">Tidak Dikenal</option>
                        </select>
                    </div>
                `;
            }

            resHTML += `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div><h3 class="font-bold text-gray-700"><i class="fas fa-list text-gray-400 mr-2"></i>Rincian Data (<span id="rincianCount">${total}</span> Baris)</h3></div>
                        ${rincianDropdown}
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-sm text-left whitespace-nowrap"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">Tgl</th><th class="px-4 py-3">Unit Kerja</th><th class="px-4 py-3">User Estim</th><th class="px-4 py-3">No Rek</th><th class="px-4 py-3">Nama & HP</th>${currentReportTab==='migrasi' ? '<th class="px-4 py-3">Fasilitator</th>' : ''}<th class="px-4 py-3">Produk</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Kendala</th></tr></thead>
                    <tbody>${data.map(c => {
                        let ownerUser = users.find(u => u.role === 'user' && isDataOwnedByUser(c, u));
                        let unitName = ownerUser && ownerUser.namaUnit ? ownerUser.namaUnit : 'Tidak Dikenal';
                        
                        return `<tr class="border-b rincian-row" data-unit="${unitName}">
                            <td class="px-4 py-3">${formatDate(c.date)}</td>
                            <td class="px-4 py-3 text-xs font-bold text-indigo-600">${unitName}</td>
                            <td class="px-4 py-3 text-gray-500 font-semibold text-xs">${c.userEstim || c.kodeCabang}</td>
                            <td class="px-4 py-3 font-mono">${c.noRek}</td>
                            <td class="px-4 py-3"><div class="font-semibold text-gray-800">${c.nama}</div><div class="text-xs text-gray-500">${c.noHp || '-'}</div></td>
                            ${currentReportTab==='migrasi' ? `<td class="px-4 py-3 text-xs text-blue-600 font-semibold">${c.namaFasilitator || '-'}</td>` : ''}
                            <td class="px-4 py-3 text-xs font-semibold text-gray-600">${getProductName(c.tipeProduk)}</td>
                            <td class="px-4 py-3 font-semibold ${checkStatus(c.status,'Sudah')?'text-green-600':checkStatus(c.status,'Belum')?'text-red-600':'text-orange-600'}">${displayStatusText(c.status)}</td>
                            <td class="px-4 py-3 text-xs text-gray-600 max-w-xs truncate" title="${c.kendala || ''}">${c.kendala || '-'}</td>
                        </tr>`;
                    }).join('') || `<tr><td colspan="${currentReportTab==='migrasi'?9:8}" class="text-center py-8 text-gray-400"><i class="fas fa-folder-open text-3xl mb-2 block"></i>Tidak ada rincian data</td></tr>`}</tbody></table></div>
                </div>
            `;
            document.getElementById('laporanResult').innerHTML = resHTML; document.getElementById('laporanResult').classList.remove('hide');
        }

        function filterRincianData(unit) {
            const rows = document.querySelectorAll('.rincian-row');
            let visibleCount = 0;
            rows.forEach(row => {
                if (unit === 'ALL' || row.getAttribute('data-unit') === unit) {
                    row.classList.remove('hide'); visibleCount++;
                } else { row.classList.add('hide'); }
            });
            const countSpan = document.getElementById('rincianCount');
            if(countSpan) countSpan.innerText = visibleCount;
        }

        // --- MANAGE USERS ---
        function renderManageUsers(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden max-w-5xl">
                    <div class="px-4 py-4 border-b bg-gray-50 flex justify-between items-center"><h3 class="font-semibold text-gray-700">Manajemen User</h3><button onclick="openUserModal()" class="bg-bjGreen text-white px-3 py-2 rounded text-sm"><i class="fas fa-plus mr-2"></i>Tambah</button></div>
                    <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">ID (Kode)</th><th class="px-4 py-3">Nama Unit</th><th class="px-4 py-3">Nama User</th><th class="px-4 py-3">Role</th><th class="px-4 py-3">Estim</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead><tbody id="userTableBody">${generateUserTableRows()}</tbody></table></div>
                </div>
            `;
        }

        function generateUserTableRows() {
            return users.map(u => `<tr class="border-b"><td class="px-4 py-3 font-mono font-semibold">${u.id}</td><td class="px-4 py-3 text-gray-800">${u.namaUnit}</td><td class="px-4 py-3 text-gray-600">${u.namaUser}</td><td class="px-4 py-3"><span class="px-2 py-1 text-xs font-semibold rounded ${u.role==='admin'?'bg-red-100 text-red-800':u.role==='supervisor'?'bg-yellow-100 text-yellow-800':u.role==='fasilitator'?'bg-purple-100 text-purple-800':'bg-blue-100 text-blue-800'}">${u.role.toUpperCase()}</span></td><td class="px-4 py-3 text-xs">${u.userEstim || '-'}</td><td class="px-4 py-3 text-center"><button onclick="openUserModal('${u.id}')" class="text-blue-500 mr-3 hover:text-blue-700"><i class="fas fa-edit"></i></button>${u.id !== 'ADMIN' ? `<button onclick="deleteUser('${u.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>` : ''}</td></tr>`).join('');
        }

        function openUserModal(id = null) {
            document.getElementById('userForm').reset();
            if(id) {
                const u = users.find(x => x.id === id); document.getElementById('userModalTitle').innerText = "Edit User"; document.getElementById('user_mode').value = "edit"; document.getElementById('user_id').value = u.id; document.getElementById('user_id').readOnly = true; document.getElementById('user_unit').value = u.namaUnit || ''; document.getElementById('user_nama').value = u.namaUser || ''; document.getElementById('user_role').value = u.role; document.getElementById('user_estim').value = u.userEstim || ''; document.getElementById('user_pwd').value = u.password;
            } else {
                document.getElementById('userModalTitle').innerText = "Tambah User"; document.getElementById('user_mode').value = "add"; document.getElementById('user_id').readOnly = false;
            }
            document.getElementById('userModal').classList.remove('hide');
        }

        function saveUserData(e) {
            e.preventDefault(); const data = { id: document.getElementById('user_id').value.trim(), namaUnit: document.getElementById('user_unit').value.trim(), namaUser: document.getElementById('user_nama').value.trim(), role: document.getElementById('user_role').value, userEstim: document.getElementById('user_estim').value.trim(), password: document.getElementById('user_pwd').value, mode: document.getElementById('user_mode').value };
            showLoader('Menyimpan User...');
            google.script.run.withSuccessHandler(function() {
                if(data.mode === 'add') users.push(data); else { let idx = users.findIndex(u => u.id == data.id); if(idx > -1) users[idx] = {...users[idx], ...data}; }
                hideLoader(); document.getElementById('userModal').classList.add('hide'); if(currentView === 'manage_users') document.getElementById('userTableBody').innerHTML = generateUserTableRows();
            }).saveUser(data);
        }

        function deleteUser(id) {
            if(!confirm('Yakin hapus?')) return; showLoader('Menghapus...');
            google.script.run.withSuccessHandler(function() {
                users = users.filter(u => u.id != id); hideLoader(); if(currentView === 'manage_users') document.getElementById('userTableBody').innerHTML = generateUserTableRows();
            }).deleteUser(id);
        }

        // --- MANAGE PRODUCTS ---
        function renderManageProducts(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden max-w-2xl">
                    <div class="px-4 py-4 border-b bg-gray-50 flex justify-between items-center"><h3 class="font-semibold text-gray-700">Kode Produk</h3><button onclick="openProductModal()" class="bg-bjGreen text-white px-3 py-2 rounded text-sm"><i class="fas fa-plus mr-2"></i>Tambah</button></div>
                    <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">Kode</th><th class="px-4 py-3">Nama Produk</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead><tbody id="productTableBody">${generateProductTableRows()}</tbody></table></div>
                </div>
            `;
        }

        function generateProductTableRows() { return products.map(p => `<tr class="border-b"><td class="px-4 py-3 font-mono">${p.kode}</td><td class="px-4 py-3 font-medium text-gray-800">${p.nama}</td><td class="px-4 py-3 text-center"><button onclick="openProductModal('${p.kode}')" class="text-blue-500 mr-3 hover:text-blue-700"><i class="fas fa-edit"></i></button><button onclick="deleteProduct('${p.kode}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="3" class="text-center py-6 text-gray-500">Kosong</td></tr>'; }

        function openProductModal(kode = null) {
            document.getElementById('productForm').reset();
            if(kode) { const p = products.find(x => x.kode === kode); document.getElementById('product_mode').value = "edit"; document.getElementById('product_kode').value = p.kode; document.getElementById('product_kode').readOnly = true; document.getElementById('product_nama').value = p.nama; } 
            else { document.getElementById('product_mode').value = "add"; document.getElementById('product_kode').readOnly = false; }
            document.getElementById('productModal').classList.remove('hide');
        }

        function saveProductData(e) {
            e.preventDefault(); const data = { kode: document.getElementById('product_kode').value.trim().toUpperCase(), nama: document.getElementById('product_nama').value.trim(), mode: document.getElementById('product_mode').value };
            showLoader('Menyimpan Produk...');
            google.script.run.withSuccessHandler(function() {
                if(data.mode === 'add') products.push(data); else { let idx = products.findIndex(p => p.kode == data.kode); if(idx > -1) products[idx] = {...products[idx], ...data}; }
                hideLoader(); document.getElementById('productModal').classList.add('hide'); if(currentView === 'manage_products') document.getElementById('productTableBody').innerHTML = generateProductTableRows();
            }).saveProduct(data);
        }

        function deleteProduct(kode) {
            if(!confirm('Yakin hapus?')) return; showLoader('Menghapus...');
            google.script.run.withSuccessHandler(function() {
                products = products.filter(p => p.kode != kode); hideLoader(); if(currentView === 'manage_products') document.getElementById('productTableBody').innerHTML = generateProductTableRows();
            }).deleteProduct(kode);
        }

        // --- PENGATURAN WHATSAPP FONNTE (UPDATED) ---
        function renderPengaturanWA(container) {
            const token = appSettings.WA_TOKEN || '';
            const target = appSettings.WA_TARGET || '';
            const status = appSettings.WA_STATUS || 'OFF';
            const isChecked = status === 'ON' ? 'checked' : '';

            container.innerHTML = `
                <div class="max-w-2xl mx-auto space-y-6">
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden border-t-4 border-bjGreen">
                        <div class="px-4 py-4 border-b bg-gray-50 flex items-center">
                            <i class="fab fa-whatsapp text-green-500 text-xl mr-3"></i>
                            <h3 class="font-bold text-gray-700">Pengaturan Notifikasi WA (Fonnte)</h3>
                        </div>
                        <div class="p-6">
                            <form onsubmit="saveWaSettings(event)" class="space-y-5">
                                <div class="flex items-center justify-between bg-gray-50 p-4 rounded border">
                                    <div>
                                        <label class="block text-sm font-bold text-gray-800 mb-1">Status Auto-Kirim WA</label>
                                        <p class="text-xs text-gray-500">Aktifkan atau matikan pengiriman pesan otomatis.</p>
                                    </div>
                                    <label class="flex items-center cursor-pointer">
                                      <div class="relative">
                                        <input type="checkbox" id="wa_status" class="sr-only" ${isChecked}>
                                        <div class="block bg-gray-300 w-12 h-7 rounded-full transition duration-300 toggle-bg"></div>
                                        <div class="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition duration-300"></div>
                                      </div>
                                      <div class="ml-3 text-sm font-bold w-16" id="wa_status_label" style="color: ${status==='ON'?'#005C3A':'#6b7280'}">${status === 'ON' ? 'AKTIF' : 'NONAKTIF'}</div>
                                    </label>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-bold mb-1 text-gray-700">Token Fonnte</label>
                                    <input type="text" id="wa_token" value="${token}" class="w-full border rounded-lg px-4 py-2 text-sm focus:border-bjGreen outline-none transition" placeholder="Masukkan Token API Fonnte">
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-bold mb-1 text-gray-700">No HP / ID Group Target</label>
                                    <input type="text" id="wa_target" value="${target}" class="w-full border rounded-lg px-4 py-2 text-sm focus:border-bjGreen outline-none transition" placeholder="Contoh: 0812xxx atau 1203xxx-group">
                                </div>
                                
                                <div class="pt-4 border-t flex justify-end">
                                    <button type="submit" class="bg-bjGreen text-white px-6 py-2.5 rounded-lg font-bold shadow-md hover:bg-bjGreenDark transition">
                                        <i class="fas fa-save mr-2"></i>Simpan Pengaturan
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="bg-amber-50 rounded-xl p-5 border border-amber-200 shadow-sm flex items-center justify-between">
                        <div class="space-y-1 pr-4">
                            <h4 class="font-bold text-sm text-amber-900 flex items-center">
                                <i class="fas fa-bullhorn mr-2 text-amber-600"></i> Resend Notifikasi Gagal?
                            </h4>
                            <p class="text-xs text-amber-700">
                                Gunakan tombol di samping untuk memicu ulang pengiriman ringkasan data data yang berhasil diupload sepanjang hari ini.
                            </p>
                        </div>
                        <button onclick="triggerResendWa()" class="bg-amber-600 text-white px-5 py-3 rounded-lg font-bold text-xs shadow hover:bg-amber-700 transition flex items-center shrink-0">
                            <i class="fas fa-paper-plane mr-2"></i> Kirim Ulang Notif Hari Ini
                        </button>
                    </div>
                </div>

                <style>
                    #wa_status:checked ~ .dot { transform: translateX(100%); background-color: #fff; }
                    #wa_status:checked ~ .toggle-bg { background-color: #005C3A; }
                </style>
            `;

            document.getElementById('wa_status').addEventListener('change', function() {
                const label = document.getElementById('wa_status_label');
                label.innerText = this.checked ? 'AKTIF' : 'NONAKTIF';
                label.style.color = this.checked ? '#005C3A' : '#6b7280';
            });
        }

        // Fungsi Handler untuk Tombol Kirim Ulang Manual
        function triggerResendWa() {
            if(!confirm("Kirim ulang notifikasi untuk seluruh hasil upload data hari ini?")) return;
            
            showLoader('Trigger WA Notif...');
            google.script.run.withSuccessHandler(function(res) {
                hideLoader();
                if(res && (res.includes("true") || res.includes("id") || res.includes("success"))) {
                    showToast('Notifikasi ulang berhasil dikirim !');
                } else if (res === "Disabled") {
                    showToast('Gagal: Pastikan Status WA AKTIF dan konfigurasi terisi.', 'error');
                } else {
                    showToast('Respon sistem: ' + res);
                }
            }).resendTodayNotification();
        }

        function saveWaSettings(e) {
            e.preventDefault();
            const data = {
                token: document.getElementById('wa_token').value.trim(),
                target: document.getElementById('wa_target').value.trim(),
                status: document.getElementById('wa_status').checked ? 'ON' : 'OFF'
            };
            
            showLoader('Menyimpan Pengaturan WA...');
            google.script.run.withSuccessHandler(function() {
                appSettings.WA_TOKEN = data.token;
                appSettings.WA_TARGET = data.target;
                appSettings.WA_STATUS = data.status;
                hideLoader();
                showToast('Pengaturan WA berhasil diperbarui!');
            }).saveSettings(data);
        }
    </script>
</body>
</html>
