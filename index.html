        function getLocalYM() {
            const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().substring(0, 7);
        }
        function getLocalYMD() {
            const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        }

        const formatDate = (dateString) => {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' });

        const getProductName = (kode) => {
            if (!kode) return '-';
            const cleanKode = (kode.toString() || '').replace(/^'/, '').trim().toUpperCase();
            const prod = products.find(p => (p.kode.toString() || '').replace(/^'/, '').trim().toUpperCase() === cleanKode);

        const cleanStr = (s) => (s || '').toString().replace(/^'/, '').trim().toUpperCase();

        const displayStatusText = (statusStr) => {
            if (checkStatus(statusStr, 'Sudah')) return 'Sudah aktivasi';
            if (checkStatus(statusStr, 'Belum')) return 'Belum aktivasi';
            if (checkStatus(statusStr, 'Tidak')) return 'Tidak dapat diaktivasi';
            return statusStr || '-';
        };

        const isDataOwnedByUser = (itemData, userObj) => {
            const estimArray = (userObj.userEstim || '').split(',').map(s => cleanStr(s)).filter(s => s !== '');
            if (estimArray.length > 0) return estimArray.includes(cleanStr(itemData.userEstim));
            return cleanStr(itemData.kodeCabang) === cleanStr(userObj.id);
        };

        // ============================================================
        // SUPABASE: LOAD DATA AWAL
        // ============================================================
        // Helper: ambil SEMUA baris dari tabel (handle pagination limit 1000)
        async function fetchAllRows(tableName, chunkSize = 1000) {
            let allRows = [], start = 0, hasMore = true;
            while (hasMore) {
                const { data, error } = await db.from(tableName).select('*').range(start, start + chunkSize - 1);
                if (error) throw error;
                if (data && data.length > 0) { allRows = allRows.concat(data); }
                hasMore = data && data.length === chunkSize;
                start += chunkSize;
            }
            return allRows;
        }

        async function loadInitialData() {
            showLoader('Menghubungkan ke Database...');
            try {
                const [usersRes, customersData, migrasiDataRaw, productsRes, settingsRes] = await Promise.all([
                    db.from('users').select('*'),
                    fetchAllRows('data_aktivasi'),
                    fetchAllRows('data_migrasi'),
                    db.from('produk').select('*'),
                    db.from('settings').select('*')
                ]);

                if (usersRes.error) throw usersRes.error;
                if (productsRes.error) throw productsRes.error;
                if (settingsRes.error) throw settingsRes.error;

                users = (usersRes.data || []).map(r => ({
                    id: r.id, namaUnit: r.nama_unit, namaUser: r.nama_user,
                    role: r.role, userEstim: r.user_estim || '', password: r.password
                }));

                customers = (customersData || [])
                    .filter(r => r.id)
                    .map(r => mapAktivasiRow(r));
                console.log('✅ customers loaded:', customers.length, 'rows');

                migrasiData = (migrasiDataRaw || [])
                    .filter(r => r.id)
                    .map(r => mapMigrasiRow(r));
                console.log('✅ migrasiData loaded:', migrasiData.length, 'rows');

                products = (productsRes.data || []).map(r => ({ kode: r.kode_produk, nama: r.nama_produk }));

                appSettings = {};
                (settingsRes.data || []).forEach(r => { appSettings[r.key] = r.value; });

                hideLoader();
                if (currentUser) navigate(currentView, document.getElementById('pageTitle').innerText);
            } catch (err) {
                hideLoader();
                alert('Gagal memuat data: ' + (err.message || JSON.stringify(err)));
                console.error(err);
            }
        }

        function mapAktivasiRow(r) {
            let status = (r.status === 'Pending' || !r.status) ? 'Belum' : r.status;
            return {
                id: r.id.toString(), date: r.date, kodeCabang: r.kode_cabang || '',
                cif: r.cif || '', noRek: r.no_rek || '', tipeProduk: r.tipe_produk || '',
                nama: r.nama || '', noHp: r.no_hp || '', userEstim: r.user_estim || '',
                status: status, kendala: r.kendala || ''
            };
        }

        function mapMigrasiRow(r) {
            let status = (r.status === 'Pending' || !r.status) ? 'Belum' : r.status;
            return {
                id: r.id.toString(), date: r.date, kodeCabang: r.kode_cabang || '',
                cif: r.cif || '', noRek: r.no_rek || '', tipeProduk: r.tipe_produk || '',
                nama: r.nama || '', noHp: r.no_hp || '', userEstim: r.user_estim || '',
                namaFasilitator: r.nama_fasilitator || '', status: status, kendala: r.kendala || ''
            };
        }

        window.onload = function () {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            loadInitialData();
        };

        async function refreshData() {
            showLoader('Menyinkronkan data terbaru...');
            await loadInitialData();
            showToast('Data berhasil disinkronkan!');
            navigate(currentView, document.getElementById('pageTitle').innerText);
        }

        function handleLogin(e) {
            e.preventDefault();

            const user = users.find(u => u.id === id && u.password === pwd);

                document.getElementById('appScreen').classList.remove('hide');
                document.getElementById('userNameDisplay').innerText = user.id + ' - ' + (user.namaUser || 'Pengguna');
                let roleText = 'Unit: ' + (user.namaUnit || '-');
                if (user.role === 'admin') roleText = 'Administrator';
                if (user.role === 'supervisor') roleText = 'Supervisor - ' + (user.namaUnit || '');
                if (user.role === 'fasilitator') roleText = 'Fasilitator - ' + (user.namaUnit || '');
                document.getElementById('userRoleDisplay').innerText = roleText;
                document.getElementById('userInitial').innerText = (user.namaUser || user.id).charAt(0).toUpperCase();
                buildMenu(); navigate('dashboard');
            } else { document.getElementById('loginError').classList.remove('hide'); }
        }

        function downloadTemplateExcel(isMigrasi = false) {
            let templateData;

            } else {
                templateData = [{ "kode_cabang": "009", "cif": "12345678", "no_rekening": "009123456789", "nama_rekening": "Budi Santoso", "tipe_produk": "T01", "no_hp": "081234567890", "user_estim": "JTM009SP01" }];
            }
            const label = isMigrasi ? 'Migrasi' : 'Aktivasi_Baru';
            const ws = XLSX.utils.json_to_sheet(templateData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, `Template_${label}_JConnect.xlsx`);

        async function handleFileUpload(e, isMigrasi) {
            e.preventDefault();
            const form = e.target;
            const fileInput = form.querySelector('input[type="file"]');
            const dateInput = form.querySelector('input[type="date"]').value;
            if (fileInput.files.length === 0) return;
            showLoader('Membaca Excel...');

            const reader = new FileReader();
            reader.onload = async function (evt) {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                let mappedData = [];

                for (let row of jsonData) {
                    let getVal = (possibleKeys) => {
                        let key = Object.keys(row).find(k => possibleKeys.includes(k.toLowerCase().trim()));
                        return key ? row[key].toString() : "";
                    };
                    let cab = getVal(['kodecabang', 'kode cabang', 'kode_cabang']);
                    if (currentUser.role === 'user') { cab = currentUser.id; }
                    let cleanRek = getVal(['norek', 'no_rekening', 'no rekening']).trim();

                    if (cleanRek !== "") {
                        let obj = {
                            date: dateInput, kode_cabang: cab,
                            cif: getVal(['cif']), no_rek: cleanRek,
                            tipe_produk: getVal(['tipeproduk', 'tipe_produk', 'tipe produk']),
                            nama: getVal(['nama', 'nama_rekening', 'nama rekening']),
                            no_hp: getVal(['nohp', 'no hp', 'no_hp']),
                            user_estim: getVal(['userinput', 'user_input', 'user_estim', 'user estim']),
                            kendala: ''
                        };
                        if (isMigrasi) {
                            obj.nama_fasilitator = getVal(['nama_fasilitator', 'nama fasilitator', 'namafasilitator', 'fasilitator']);
                            obj.status = 'Sudah';
                        } else {
                            obj.status = 'Belum';
                        }
                        mappedData.push(obj);
                    }
                }

                if (mappedData.length === 0) { hideLoader(); alert("Gagal. File Excel kosong atau format header tidak sesuai."); return; }

                showLoader(`Menyimpan ${mappedData.length} baris data ke Database...`);
                try {
                    const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                    const { data: inserted, error } = await db.from(tableName).insert(mappedData).select();
                    if (error) throw error;

                    const newItems = (inserted || []).map(r => isMigrasi ? mapMigrasiRow(r) : mapAktivasiRow(r));
                    if (isMigrasi) migrasiData = migrasiData.concat(newItems).filter(c => c.id);
                    else customers = customers.concat(newItems).filter(c => c.id);

                    // Kirim notif WA jika bukan migrasi
                    if (!isMigrasi) {
                        await sendWaFonnte(`*Notifikasi JConnect Monitor*\n\nSudah dilakukan upload *${mappedData.length} data Rekening Baru* ke dalam sistem. Silahkan cek aplikasi JConnect Monitor untuk update Data Aktivasi JConnect hari ini, Terima Kasih 🙏🏻.\n\n_from JCMonitor Apps_`);
                    }

                    hideLoader();
                    alert(`Upload Berhasil! ${mappedData.length} data valid berhasil ditambahkan.`);
                    fileInput.value = "";
                    if (currentView === 'input_aktivasi') renderInputAktivasi(document.getElementById('mainContent'), currentInputTab);
                } catch (err) { hideLoader(); alert('Gagal simpan: ' + err.message); }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        function toggleSelectAll(source) {
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = source.checked);

        function toggleBulkDeleteBtn() {
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            const totalBoxes = document.querySelectorAll('.row-checkbox').length;
            const btnDelete = document.getElementById('btnBulkDelete');
            const checkAll = document.getElementById('checkAll');
            if (checkedBoxes.length > 0) btnDelete.classList.remove('hide');
            else btnDelete.classList.add('hide');
            if (checkedBoxes.length === totalBoxes && totalBoxes > 0) checkAll.checked = true;
            else checkAll.checked = false;
        }

        async function deleteSelected(tab) {
            const isMigrasi = tab === 'migrasi';
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
            if (checkedBoxes.length === 0) return;
            if (!confirm(`Apakah Anda yakin ingin menghapus permanen ${checkedBoxes.length} data terpilih?`)) return;
            const ids = Array.from(checkedBoxes).map(cb => cb.value);
            showLoader(`Menghapus ${ids.length} data...`);
            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                const { error } = await db.from(tableName).delete().in('id', ids);
                if (error) throw error;
                if (isMigrasi) migrasiData = migrasiData.filter(c => !ids.includes(c.id.toString()));
                else customers = customers.filter(c => !ids.includes(c.id.toString()));
                hideLoader();
                const checkAll = document.getElementById('checkAll');
                if (checkAll) checkAll.checked = false;
                toggleBulkDeleteBtn();
                applyFilterAdmin(tab);
                showToast(`${ids.length} data berhasil dihapus`);
            } catch (err) { hideLoader(); alert('Gagal hapus: ' + err.message); }
        }

        async function deleteCustomer(id, isMigrasi) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            showLoader('Menghapus...');
            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                const { error } = await db.from(tableName).delete().eq('id', id);
                if (error) throw error;
                if (isMigrasi) migrasiData = migrasiData.filter(c => c.id != id);
                else customers = customers.filter(c => c.id != id);
                hideLoader();
                applyFilterAdmin(isMigrasi ? 'migrasi' : 'baru');
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

                no_hp: document.getElementById('edit_hp').value,
                user_estim: document.getElementById('edit_userestim').value
            };
            if (isMigrasi) payload.nama_fasilitator = document.getElementById('edit_fasil').value;

            showLoader('Menyimpan Data...');
            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                if (mode === 'add') {
                    payload.status = isMigrasi ? 'Sudah' : 'Belum';
                    payload.kendala = '';
                    const { data: inserted, error } = await db.from(tableName).insert(payload).select().single();
                    if (error) throw error;
                    const newItem = isMigrasi ? mapMigrasiRow(inserted) : mapAktivasiRow(inserted);
                    if (isMigrasi) migrasiData.push(newItem); else customers.push(newItem);
                } else {
                    const { error } = await db.from(tableName).update(payload).eq('id', id);
                    if (error) throw error;
                    let arr = isMigrasi ? migrasiData : customers;
                    let index = arr.findIndex(c => c.id == id);
                    if (index > -1) {
                        arr[index] = { ...arr[index], ...{ date: payload.date, kodeCabang: payload.kode_cabang, cif: payload.cif, noRek: payload.no_rek, nama: payload.nama, tipeProduk: payload.tipe_produk, noHp: payload.no_hp, userEstim: payload.user_estim } };
                        if (isMigrasi) arr[index].namaFasilitator = payload.nama_fasilitator || '';
                    }
                }
                hideLoader();
                document.getElementById('editModal').classList.add('hide');
                applyFilterAdmin(isMigrasi ? 'migrasi' : 'baru');
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }

        async function autoSaveField(id, field, value, isMigrasi) {
            // field sudah dalam format snake_case (no_rek, nama, no_hp, nama_fasilitator)
            let arr = isMigrasi ? migrasiData : customers;
            // Map field DB ke field state lokal
            const fieldMap = { no_rek: 'noRek', nama: 'nama', no_hp: 'noHp', nama_fasilitator: 'namaFasilitator' };
            let cust = arr.find(c => c.id == id);
            if (cust && cust[fieldMap[field]] === value) return;
            if (cust) cust[fieldMap[field]] = value;

            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                const { error } = await db.from(tableName).update({ [field]: value }).eq('id', id);
                if (error) throw error;
                showToast('Perubahan data tersimpan otomatis!');
            } catch (err) { showToast('Gagal simpan: ' + err.message, true); }
        }

        async function autoSave(id, isMigrasi) {
            const status = document.getElementById(`status_${id}`).value;
            const kendalaInput = document.getElementById(`kendala_${id}`);
            let kendala = kendalaInput.value;
            if (status === 'Sudah') { kendala = ''; kendalaInput.value = ''; }

            const selectEl = document.getElementById(`status_${id}`);
            selectEl.classList.add('opacity-50');

            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                const { error } = await db.from(tableName).update({ status, kendala }).eq('id', id);
                if (error) throw error;

                let arr = isMigrasi ? migrasiData : customers;
                let cust = arr.find(c => c.id == id);
                if (cust) { cust.status = status; cust.kendala = kendala; }

                selectEl.classList.remove('opacity-50');
                selectEl.className = `w-full border rounded px-2 py-1.5 text-sm transition ${status === 'Sudah' ? 'bg-green-50 text-green-700 font-semibold border-green-200' : status === 'Tidak' ? 'bg-orange-50 text-orange-700 font-semibold border-orange-200' : 'bg-red-50 text-red-700 font-semibold border-red-200'}`;

                if ((status === 'Belum' || status === 'Tidak') && !kendala.trim()) {
                    showToast('Status tersimpan. Mohon isi kolom kendala!', true);
                    kendalaInput.classList.add('border-red-400', 'bg-red-50');
                } else {
                    showToast('Tersimpan otomatis!');
                    kendalaInput.classList.remove('border-red-400', 'bg-red-50');
                }
            } catch (err) { selectEl.classList.remove('opacity-50'); showToast('Gagal: ' + err.message, true); }
        }

        function toggleKendala(id, val) {
            const el = document.getElementById(`kendala_${id}`);
            if (val === 'Belum' || val === 'Tidak') {
                el.disabled = false; el.classList.remove('bg-gray-100', 'border-transparent', 'text-gray-400'); el.classList.add('bg-white', 'border-gray-300');
            } else {
                el.disabled = true; el.classList.add('bg-gray-100', 'border-transparent', 'text-gray-400'); el.classList.remove('bg-white', 'border-gray-300', 'border-red-400', 'bg-red-50'); el.value = '';
            }
        }

        function handleStatusChange(id, val, isMigrasi) {
            toggleKendala(id, val); autoSave(id, isMigrasi);
            if (val === 'Tidak' || val === 'Belum') document.getElementById(`kendala_${id}`).focus();
        }

        async function deleteInputData(id, isMigrasi) {
            if (!confirm('Apakah Anda yakin ingin menghapus baris data ini?')) return;
            showLoader('Menghapus Data...');
            try {
                const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
                const { error } = await db.from(tableName).delete().eq('id', id);
                if (error) throw error;
                if (isMigrasi) migrasiData = migrasiData.filter(c => c.id != id);
                else customers = customers.filter(c => c.id != id);
                hideLoader();
                renderInputAktivasi(document.getElementById('mainContent'), currentInputTab);
                showToast('Data berhasil dihapus');
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

        async function saveMigrasiCepat(e) {
            e.preventDefault();
            const payload = {
                date: getLocalYMD(), kode_cabang: currentUser.id, cif: '',
                no_rek: document.getElementById('migrasi_rek').value,
                nama: document.getElementById('migrasi_nama').value,
                tipe_produk: '', no_hp: document.getElementById('migrasi_hp').value,
                user_estim: document.getElementById('migrasi_estim').value,
                nama_fasilitator: document.getElementById('migrasi_fasil').value,
                status: 'Sudah', kendala: ''
            };
            showLoader('Menyimpan Data...');
            try {
                const { data: inserted, error } = await db.from('data_migrasi').insert(payload).select().single();
                if (error) throw error;
                migrasiData.push(mapMigrasiRow(inserted));
                hideLoader();
                alert("Berhasil Ditambahkan!");
                renderInputAktivasi(document.getElementById('mainContent'), 'migrasi');
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

        // Import Excel dari menu Input Aktivasi
        async function handleInputImport(fileInput, isMigrasi) {
            if (!fileInput.files.length) return;
            const file = fileInput.files[0];
            // Gunakan tanggal filter jika ada, jika tidak pakai hari ini
            const importDate = currentInputFilterDate || getLocalYMD();
            const tableName = isMigrasi ? 'data_migrasi' : 'data_aktivasi';
            const tabLabel = isMigrasi ? 'Migrasi' : 'Baru';

            showLoader(`Membaca Excel (${tabLabel})...`);
            const reader = new FileReader();
            reader.onload = async function (evt) {
                try {
                    const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
                    let mappedData = [];

                    for (let row of jsonData) {
                        let getVal = (possibleKeys) => {
                            let key = Object.keys(row).find(k => possibleKeys.includes(k.toLowerCase().trim()));
                            return key ? row[key].toString().trim() : '';
                        };
                        let cab = getVal(['kodecabang', 'kode cabang', 'kode_cabang']);
                        if (currentUser.role === 'user') { cab = currentUser.id; }
                        let cleanRek = getVal(['norek', 'no_rekening', 'no rekening']);

                        if (cleanRek !== '') {
                            let obj = {
                                date: importDate,
                                kode_cabang: cab,
                                cif: getVal(['cif']),
                                no_rek: cleanRek,
                                tipe_produk: getVal(['tipeproduk', 'tipe_produk', 'tipe produk']),
                                nama: getVal(['nama', 'nama_rekening', 'nama rekening']),
                                no_hp: getVal(['nohp', 'no hp', 'no_hp']),
                                user_estim: getVal(['userinput', 'user_input', 'user_estim', 'user estim']),
                                kendala: ''
                            };
                            if (isMigrasi) {
                                obj.nama_fasilitator = getVal(['namafasilitator', 'nama_fasilitator', 'nama fasilitator', 'fasilitator']);
                                obj.status = 'Sudah';
                            } else {
                                obj.status = 'Belum';
                            }
                            mappedData.push(obj);
                        }
                    }

                    if (mappedData.length === 0) {
                        hideLoader();
                        alert(`Gagal. File Excel kosong atau format header tidak sesuai.\n\nHeader yang dikenali:\nKODECABANG, CIF, NOREK, NAMA, TIPEPRODUK, NOHP, USERINPUT${isMigrasi ? ', NAMAFASILITATOR' : ''}\n\nAlternatif: kode_cabang, cif, no_rekening, nama_rekening, tipe_produk, no_hp, user_estim`);
                        fileInput.value = '';
                        return;
                    }

                    showLoader(`Menyimpan ${mappedData.length} data ke Database (${tabLabel})...`);
                    const { data: inserted, error } = await db.from(tableName).insert(mappedData).select();
                    if (error) throw error;

                    const newItems = (inserted || []).map(r => isMigrasi ? mapMigrasiRow(r) : mapAktivasiRow(r));
                    if (isMigrasi) {
                        migrasiData = migrasiData.concat(newItems).filter(c => c.id);
                    } else {
                        customers = customers.concat(newItems).filter(c => c.id);
                    }

                    // Kirim notif WA untuk rekening baru
                    if (!isMigrasi) {
                        try { await sendWaFonnte(`*Notifikasi JConnect Monitor*\n\nSudah dilakukan import *${mappedData.length} data Rekening Baru* via Input Aktivasi. Silahkan cek aplikasi JConnect Monitor, Terima Kasih 🙏🏻.\n\n_from JCMonitor Apps_`); } catch (_) {}
                    }

                    hideLoader();
                    alert(`Import Berhasil! ${mappedData.length} data ${tabLabel} ditambahkan ke tanggal ${formatDate(importDate)}.`);
                    fileInput.value = '';
                    renderInputAktivasi(document.getElementById('mainContent'), currentInputTab);
                } catch (err) {
                    hideLoader();
                    alert('Gagal import: ' + err.message);
                    fileInput.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

                            <div><label class="block text-xs mb-1 font-medium text-gray-600">Sampai Tgl</label><input type="date" id="lap_end" value="${getLocalYMD()}" onchange="generateLaporan('${roleContext}')" class="border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"></div>
                            ${(roleContext !== 'user') ? `<div><label class="block text-xs mb-1 font-medium text-gray-600">Pilih Nama Unit</label><select id="lap_cabang" onchange="generateLaporan('${roleContext}')" class="border rounded px-3 py-2 text-sm outline-none focus:border-bjGreen"><option value="ALL">Semua Unit Kerja (Summary)</option>${unitOptions}</select></div>` : ''}
                            <button onclick="document.getElementById('lap_start').value=''; document.getElementById('lap_end').value=''; generateLaporan('${roleContext}')" class="bg-gray-200 text-gray-700 px-5 py-2 rounded text-sm hover:bg-gray-300 transition font-medium">Semua Waktu</button>
                        </div>
                        <button onclick="takeScreenshot('laporanResult', 'Laporan_Aktivasi')" class="bg-indigo-600 text-white px-5 py-2 rounded text-sm shadow hover:bg-indigo-700 transition"><i class="fas fa-camera mr-2"></i>Screenshot</button>
                    </div>
                </div>
                <div id="laporanResult" class="hide flex flex-col gap-6 p-1 -m-1"></div>`;
            generateLaporan(roleContext);
        }

        function generateLaporan(roleContext) {
            const start = document.getElementById('lap_start').value;
            const end = document.getElementById('lap_end').value;
            const branch = document.getElementById('lap_cabang') ? document.getElementById('lap_cabang').value : 'ALL';
            let rawData = currentReportTab === 'baru' ? customers : migrasiData;
            let data = rawData;
            if (start) data = data.filter(c => c.date >= start);
            if (end) data = data.filter(c => c.date <= end);
            if (roleContext === 'user') { data = data.filter(c => canViewData(c, currentUser)); }
            else if (branch !== 'ALL') {
                const usersInUnit = users.filter(u => u.namaUnit === branch && u.role === 'user');
                data = data.filter(c => usersInUnit.some(u => isDataOwnedByUser(c, u)));
            }

            let resHTML = '';
            const total = data.length;
            const sudah = data.filter(c => checkStatus(c.status, 'Sudah')).length;
            const persentase = total === 0 ? 0 : Math.round((sudah / total) * 100);

            if (roleContext === 'user' || (roleContext !== 'user' && branch !== 'ALL')) {
                resHTML += `
                    <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 border-b border-t-4 border-t-bjGreen bg-bjLight flex justify-between items-center">
                        <div><h3 class="font-bold text-bjGreenDark text-lg">Laporan Aktivasi JConnect</h3><p class="text-sm text-gray-600 mt-1">Total Nasabah: <span class="font-bold text-gray-800">${total}</span> | Berhasil: <span class="font-bold text-green-700">${sudah}</span></p></div>
                        <div class="text-right"><div class="text-4xl font-bold text-bjGreen">${persentase}%</div><div class="text-xs font-semibold text-gray-500 tracking-wide uppercase mt-1">Success Rate</div></div>
                    </div>`;
            }

            if (roleContext !== 'user' && branch === 'ALL') {
                const sum = {};
                const activeUnits = [...new Set(users.filter(u => u.role === 'user').map(u => u.namaUnit).filter(Boolean))];
                activeUnits.forEach(unit => { sum[unit] = { name: unit, total: 0, sdh: 0, blm: 0, tdk: 0 }; });
                let unknown = { name: 'Data Tidak Dikenal', total: 0, sdh: 0, blm: 0, tdk: 0 };

                data.forEach(c => {
                    let ownerUser = users.find(u => u.role === 'user' && isDataOwnedByUser(c, u));
                    let targetSum = (ownerUser && ownerUser.namaUnit) ? sum[ownerUser.namaUnit] : unknown;
                    if (!targetSum) targetSum = unknown;
                    targetSum.total++;
                    if (checkStatus(c.status, 'Sudah')) targetSum.sdh++; else if (checkStatus(c.status, 'Tidak')) targetSum.tdk++; else targetSum.blm++;
                });

                let summaryRows = Object.values(sum).filter(s => s.total > 0);
                if (unknown.total > 0) summaryRows.push(unknown);
                let grandTotal = 0, grandSdh = 0, grandBlm = 0, grandTdk = 0;
                let summaryRowsHTML = summaryRows.map(s => {
                    grandTotal += s.total; grandSdh += s.sdh; grandBlm += s.blm; grandTdk += s.tdk;
                    let prc = s.total === 0 ? 0 : Math.round((s.sdh / s.total) * 100);
                    return `<tr class="border-b"><td class="px-4 py-3 font-bold text-gray-800">${s.name}</td><td class="px-4 py-3 text-center font-medium">${s.total}</td><td class="px-4 py-3 text-center font-semibold text-green-600 bg-green-50">${s.sdh}</td><td class="px-4 py-3 text-center text-red-500">${s.blm}</td><td class="px-4 py-3 text-center text-orange-500">${s.tdk}</td><td class="px-4 py-3 text-center font-bold text-indigo-600 bg-indigo-50">${prc}%</td></tr>`;
                }).join('') || '<tr><td colspan="6" class="text-center py-4">Tidak ada data</td></tr>';
                let grandPrc = grandTotal === 0 ? 0 : Math.round((grandSdh / grandTotal) * 100);
                let totalRowHTML = grandTotal > 0 ? `<tr class="border-t-2 border-gray-300 bg-gray-200 font-bold text-gray-800"><td class="px-4 py-3 text-right uppercase text-xs">Total Keseluruhan</td><td class="px-4 py-3 text-center">${grandTotal}</td><td class="px-4 py-3 text-center text-green-700">${grandSdh}</td><td class="px-4 py-3 text-center text-red-700">${grandBlm}</td><td class="px-4 py-3 text-center text-orange-700">${grandTdk}</td><td class="px-4 py-3 text-center text-indigo-700">${grandPrc}%</td></tr>` : '';
                resHTML += `
                    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
                        <div class="p-4 border-b bg-bjLight"><h3 class="font-bold text-bjGreenDark"><i class="fas fa-chart-bar mr-2"></i>Tabel Summary Aktivasi Per Unit Kerja</h3></div>
                        <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">Nama Unit Kerja</th><th class="px-4 py-3 text-center">Total Data</th><th class="px-4 py-3 text-center text-green-600">Sudah Aktivasi</th><th class="px-4 py-3 text-center text-red-600">Belum Aktivasi</th><th class="px-4 py-3 text-center text-orange-600">Tidak Bisa</th><th class="px-4 py-3 text-center">% Berhasil</th></tr></thead>
                        <tbody>${summaryRowsHTML}${totalRowHTML}</tbody></table></div>
                    </div>`;
            }

            let rincianDropdown = '';
            if (roleContext !== 'user') {
                const uniqueUnitsForDetail = [...new Set(users.filter(u => u.role === 'user').map(u => u.namaUnit).filter(Boolean))];
                let unitDetailOptions = uniqueUnitsForDetail.map(unit => `<option value="${unit}">${unit}</option>`).join('');
                rincianDropdown = `<div class="flex items-center space-x-2 w-full sm:w-auto mt-2 sm:mt-0"><label class="text-xs font-semibold text-gray-500 whitespace-nowrap"><i class="fas fa-filter mr-1"></i>Filter Unit:</label><select id="filterRincian" onchange="filterRincianData(this.value)" class="w-full sm:w-auto border border-gray-300 rounded px-2 py-1.5 text-xs outline-none focus:border-bjGreen"><option value="ALL">Semua Unit Kerja</option>${unitDetailOptions}<option value="Tidak Dikenal">Tidak Dikenal</option></select></div>`;
            }

            resHTML += `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <div class="p-4 border-b bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                        <div><h3 class="font-bold text-gray-700"><i class="fas fa-list text-gray-400 mr-2"></i>Rincian Data (<span id="rincianCount">${total}</span> Baris)</h3></div>
                        ${rincianDropdown}
                    </div>
                    <div class="overflow-x-auto"><table class="w-full text-sm text-left whitespace-nowrap"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">Tgl</th><th class="px-4 py-3">Unit Kerja</th><th class="px-4 py-3">User Estim</th><th class="px-4 py-3">No Rek</th><th class="px-4 py-3">Nama & HP</th>${currentReportTab === 'migrasi' ? '<th class="px-4 py-3">Fasilitator</th>' : ''}<th class="px-4 py-3">Produk</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Kendala</th></tr></thead>
                    <tbody>${data.map(c => {
                        let ownerUser = users.find(u => u.role === 'user' && isDataOwnedByUser(c, u));
                        let unitName = ownerUser && ownerUser.namaUnit ? ownerUser.namaUnit : 'Tidak Dikenal';
                        return `<tr class="border-b rincian-row" data-unit="${unitName}"><td class="px-4 py-3">${formatDate(c.date)}</td><td class="px-4 py-3 text-xs font-bold text-indigo-600">${unitName}</td><td class="px-4 py-3 text-gray-500 font-semibold text-xs">${c.userEstim || c.kodeCabang}</td><td class="px-4 py-3 font-mono">${c.noRek}</td><td class="px-4 py-3"><div class="font-semibold text-gray-800">${c.nama}</div><div class="text-xs text-gray-500">${c.noHp || '-'}</div></td>${currentReportTab === 'migrasi' ? `<td class="px-4 py-3 text-xs text-blue-600 font-semibold">${c.namaFasilitator || '-'}</td>` : ''}<td class="px-4 py-3 text-xs font-semibold text-gray-600">${getProductName(c.tipeProduk)}</td><td class="px-4 py-3 font-semibold ${checkStatus(c.status,'Sudah')?'text-green-600':checkStatus(c.status,'Belum')?'text-red-600':'text-orange-600'}">${displayStatusText(c.status)}</td><td class="px-4 py-3 text-xs text-gray-600 max-w-xs truncate" title="${c.kendala || ''}">${c.kendala || '-'}</td></tr>`;
                    }).join('') || `<tr><td colspan="${currentReportTab === 'migrasi' ? 9 : 8}" class="text-center py-8 text-gray-400"><i class="fas fa-folder-open text-3xl mb-2 block"></i>Tidak ada rincian data</td></tr>`}</tbody></table></div>
                </div>`;

            document.getElementById('laporanResult').innerHTML = resHTML;
            document.getElementById('laporanResult').classList.remove('hide');
        }

        function filterRincianData(unit) {
            const rows = document.querySelectorAll('.rincian-row');
            let visibleCount = 0;
            rows.forEach(row => {
                if (unit === 'ALL' || row.getAttribute('data-unit') === unit) { row.classList.remove('hide'); visibleCount++; }
                else { row.classList.add('hide'); }
            });
            const countSpan = document.getElementById('rincianCount');
            if (countSpan) countSpan.innerText = visibleCount;
        }

        // MANAGE USERS

        function renderManageUsers(container) {
            container.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden max-w-5xl">
                    <div class="px-4 py-4 border-b bg-gray-50 flex justify-between items-center"><h3 class="font-semibold text-gray-700">Manajemen User</h3><button onclick="openUserModal()" class="bg-bjGreen text-white px-3 py-2 rounded text-sm"><i class="fas fa-plus mr-2"></i>Tambah</button></div>
                    <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-100 text-gray-600 uppercase text-xs"><tr><th class="px-4 py-3">ID (Kode)</th><th class="px-4 py-3">Nama Unit</th><th class="px-4 py-3">Nama User</th><th class="px-4 py-3">Role</th><th class="px-4 py-3">Estim</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead><tbody id="userTableBody">${generateUserTableRows()}</tbody></table></div>

        function generateUserTableRows() {
            return users.map(u => `<tr class="border-b"><td class="px-4 py-3 font-mono font-semibold">${u.id}</td><td class="px-4 py-3 text-gray-800">${u.namaUnit}</td><td class="px-4 py-3 text-gray-600">${u.namaUser}</td><td class="px-4 py-3"><span class="px-2 py-1 text-xs font-semibold rounded ${u.role==='admin'?'bg-red-100 text-red-800':u.role==='supervisor'?'bg-yellow-100 text-yellow-800':u.role==='fasilitator'?'bg-purple-100 text-purple-800':'bg-blue-100 text-blue-800'}">${u.role.toUpperCase()}</span></td><td class="px-4 py-3 text-xs">${u.userEstim || '-'}</td><td class="px-4 py-3 text-center"><button onclick="openUserModal('${u.id}')" class="text-blue-500 mr-3 hover:text-blue-700"><i class="fas fa-edit"></i></button>${u.id !== 'ADMIN' ? `<button onclick="deleteUser('${u.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>` : ''}</td></tr>`).join('');
        }

        function openUserModal(id = null) {
            document.getElementById('userForm').reset();
            if (id) {
                const u = users.find(x => x.id === id);
                document.getElementById('userModalTitle').innerText = "Edit User";
                document.getElementById('user_mode').value = "edit";
                document.getElementById('user_id').value = u.id; document.getElementById('user_id').readOnly = true;
                document.getElementById('user_unit').value = u.namaUnit || '';
                document.getElementById('user_nama').value = u.namaUser || '';
                document.getElementById('user_role').value = u.role;
                document.getElementById('user_estim').value = u.userEstim || '';
                document.getElementById('user_pwd').value = u.password;
            } else {
                document.getElementById('userModalTitle').innerText = "Tambah User";
                document.getElementById('user_mode').value = "add";
                document.getElementById('user_id').readOnly = false;
            }
            document.getElementById('userModal').classList.remove('hide');
        }

        async function saveUserData(e) {
            e.preventDefault();
            const mode = document.getElementById('user_mode').value;
            const data = {
                id: document.getElementById('user_id').value.trim(),
                nama_unit: document.getElementById('user_unit').value.trim(),
                nama_user: document.getElementById('user_nama').value.trim(),
                role: document.getElementById('user_role').value,
                user_estim: document.getElementById('user_estim').value.trim(),
                password: document.getElementById('user_pwd').value
            };
            showLoader('Menyimpan User...');
            try {
                if (mode === 'add') {
                    const { error } = await db.from('users').insert(data);
                    if (error) throw error;
                    users.push({ id: data.id, namaUnit: data.nama_unit, namaUser: data.nama_user, role: data.role, userEstim: data.user_estim, password: data.password });
                } else {
                    const { error } = await db.from('users').update(data).eq('id', data.id);
                    if (error) throw error;
                    let idx = users.findIndex(u => u.id == data.id);
                    if (idx > -1) users[idx] = { id: data.id, namaUnit: data.nama_unit, namaUser: data.nama_user, role: data.role, userEstim: data.user_estim, password: data.password };
                }
                hideLoader();
                document.getElementById('userModal').classList.add('hide');
                if (currentView === 'manage_users') document.getElementById('userTableBody').innerHTML = generateUserTableRows();
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

        async function deleteUser(id) {
            if (!confirm('Yakin hapus?')) return;
            showLoader('Menghapus...');
            try {
                const { error } = await db.from('users').delete().eq('id', id);
                if (error) throw error;
                users = users.filter(u => u.id != id);
                hideLoader();
                if (currentView === 'manage_users') document.getElementById('userTableBody').innerHTML = generateUserTableRows();
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

                </div>
                <style>
                    #wa_status:checked ~ .dot { transform: translateX(100%); background-color: #fff; }

            document.getElementById('wa_status').addEventListener('change', function () {
                const label = document.getElementById('wa_status_label');

        async function saveWaSettings(e) {
            e.preventDefault();
            const data = {
                token: document.getElementById('wa_token').value.trim(),
                target: document.getElementById('wa_target').value.trim(),
                status: document.getElementById('wa_status').checked ? 'ON' : 'OFF'
            };
            showLoader('Menyimpan Pengaturan WA...');
            try {
                // Upsert setiap setting key
                const updates = [
                    { key: 'WA_TOKEN', value: data.token },
                    { key: 'WA_TARGET', value: data.target },
                    { key: 'WA_STATUS', value: data.status }
                ];
                for (const upd of updates) {
                    const { error } = await db.from('settings').upsert(upd, { onConflict: 'key' });
                    if (error) throw error;
                }
                appSettings.WA_TOKEN = data.token;
                appSettings.WA_TARGET = data.target;
                appSettings.WA_STATUS = data.status;
                hideLoader();
                showToast('Pengaturan WA berhasil diperbarui!');
            } catch (err) { hideLoader(); alert('Gagal: ' + err.message); }
        }

        async function triggerResendWa() {
            if (!confirm("Kirim ulang notifikasi untuk seluruh hasil upload data hari ini?")) return;
            const todayStr = getLocalYMD();
            const todayCount = customers.filter(c => c.date === todayStr).length;
            let msg = '';
            if (todayCount > 0) {
                msg = `*Notifikasi JConnect Monitor*\n\nSudah dilakukan upload *${todayCount} data Rekening Baru*. Silahkan cek aplikasi *JConnect Monitor* untuk update Data Aktivasi JConnect hari ini, Terima Kasih 🙏🏻\n\n_from JCMonitor Apps_`;
            } else {
                msg = `*Notifikasi JCM*\n\nAdmin telah melakukan pengiriman ulang notifikasi. Silakan periksa sistem untuk melihat data aktivasi terbaru hari ini.\n\n_System Administrator_`;
            }
            showLoader('Trigger WA Notif...');
            const res = await sendWaFonnte(msg);
            hideLoader();
            if (res && (res.includes('true') || res.includes('id') || res.includes('success'))) showToast('Notifikasi ulang berhasil dikirim!');
            else if (res === 'Disabled') showToast('Gagal: Pastikan Status WA AKTIF dan konfigurasi terisi.', true);
            else showToast('Respon sistem: ' + (res || '-'));
        }

        async function sendWaFonnte(pesan) {
            const token = appSettings.WA_TOKEN || '';
            const target = appSettings.WA_TARGET || '';
            const status = appSettings.WA_STATUS || 'OFF';
            if (status !== 'ON' || !token || !target) return 'Disabled';
            try {
                const resp = await fetch('https://api.fonnte.com/send', {
                    method: 'POST',
                    headers: { 'Authorization': token, 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ target, message: pesan })
                });
                const text = await resp.text();
                return text;
            } catch (err) { return 'Error: ' + err.message; }
        }
    </script>
</body>
